services:
  - type: web
    name: crypto-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python src/panel.py
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SYMBOLS
        value: BTC/USD,ETH/USD,SOL/USD,XRP/USD,DOGE/USD,ADA/USD,AVAX/USD,LINK/USD,DOT/USD,SUI/USD,PEPE/USD,SHIB/USD,BONK/USD,WIF/USD,TRUMP/USD,ARB/USD,OP/USD,APT/USD,POL/USD,FIL/USD,UNI/USD,AAVE/USD,LTC/USD,BCH/USD,CRV/USD,LDO/USD,GRT/USD,RENDER/USD,SUSHI/USD,BAT/USD,ONDO/USD,PAXG/USD,HYPE/USD,SKY/USD,XTZ/USD,YFI/USD,USDC/USD,USDT/USD,ATOM/USD,ICP/USD,NEAR/USD,SEI/USD,INJ/USD,TIA/USD,JUP/USD,PYTH/USD,WLD/USD,FTM/USD,SAND/USD,MANA/USD,AXS/USD,GALA/USD,NOT/USD,TURBO/USD
      - key: PYTHON_VERSION
        value: 3.12.0