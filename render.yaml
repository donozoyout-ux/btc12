services:
  - type: web
    name: crypto-ai-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SYMBOL
        value: "BTC/USDT"
      - key: EXECUTOR_MODE
        value: "sim"
      - key: SIM_STARTING_CAPITAL
        value: "500"
      - key: POSITION_SIZE_USD
        value: "500"
      - key: PYTHON_VERSION
        value: 3.12.0
